[package]
name = "backend"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.101"
async-recursion = "1.1.1"
axum = { version = "0.8.8", features = ["macros"] }
brotli = "8.0.2"
chrono = { version = "0.4.43", features = ["serde"] }
cookie = "0.18.1"
dashmap = "6.1.0"
futures = "0.3.32"
itertools = "0.14.0"
redis = { version = "1.0.3", features = ["tokio-comp", "connection-manager"] }
regex = "1.12.3"
reqwest = { version = "0.13.2", features = ["json", "cookies", "form", "stream"] }
scraper = "0.25.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["full"] }
tower-http = { version = "0.6.8", features = ["compression-full", "timeout"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
ts-rs = "12.0.1"
uuid = { version = "1.21.0", features = ["v4", "serde"] }
