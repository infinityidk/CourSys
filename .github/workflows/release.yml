name: Release

on:
  push:
    tags: ['v*']

jobs:
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with: { version: 11 }
      - uses: actions/setup-node@v6
        with: { node-version: 26, cache: 'pnpm', cache-dependency-path: frontend/pnpm-lock.yaml }
      - run: cd frontend && pnpm install && pnpm build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
          if-no-files-found: error

  build:
    needs: frontend
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_short: linux
            binary_name: CourSys
          - os: macos-latest
            target: x86_64-apple-darwin
            os_short: macos
            binary_name: CourSys
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_short: windows
            binary_name: CourSys.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.target }}' }
      - uses: actions/download-artifact@v8
        with: { name: frontend-dist, path: frontend/dist }
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}

      - name: Set version
        id: vars
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package
        shell: bash
        run: |
          ver="${{ steps.vars.outputs.version }}"
          os="${{ matrix.os_short }}"
          dir="CourSys-${ver}-${os}"
          mkdir -p "$dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$dir/"
          cp -r backend/data "$dir/"
          if [ "${{ runner.os }}" = "Windows" ]; then
            zipname="CourSys-${ver}-${os}.zip"
            7z a -tzip "$zipname" "$dir"
          else
            tarname="CourSys-${ver}-${os}.tar.gz"
            tar -czf "$tarname" "$dir"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: CourSys-${{ matrix.os_short }}
          path: CourSys-${{ steps.vars.outputs.version }}-${{ matrix.os_short }}.*
          retention-days: 1
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/download-artifact@v8
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/CourSys-*/*